# ============================================================
# 承富 AI · 本機開發 override
# ============================================================
# 此檔在本機自動被 docker compose 讀取(配合 docker-compose.yml)
# 讓本機啟動更簡單,不需 Cloudflare Tunnel、不需外部域名
#
# 用法:
#   cd config-templates
#   docker compose up -d              # 會自動 merge override
#
# 移除本檔若要測生產設定:
#   mv docker-compose.override.yml /tmp/
# ============================================================

services:
  # 本機 LibreChat 對外 expose 3080,方便直接除錯
  librechat:
    ports:
      - "3080:3080"
    environment:
      - DOMAIN_CLIENT=http://localhost
      - DOMAIN_SERVER=http://localhost
      # 本機開發日誌多一點
      - DEBUG_LOGGING=true
      - LOG_LEVEL=debug
    # 本機不限記憶體(方便除錯)
    mem_limit: 8g

  # 本機 nginx 只用 80,不綁 443(沒 SSL)
  nginx:
    ports:
      - "80:80"

  # ============================================================
  # Codex R8#6 · 本機 dev mode override
  # ============================================================
  # docker-compose.yml 預設 ECC_ENV=production · 啟動會驗 JWT_REFRESH_SECRET
  # 本機沒 LibreChat .env 同步 · 強制 dev mode 不擋啟動
  accounting:
    environment:
      - ECC_ENV=development
      - NODE_ENV=development
      # dev mode 預設 ALLOW_LEGACY_AUTH_HEADERS · launcher 沒 cookie 時仍能用 X-User-Email
      - ALLOW_LEGACY_AUTH_HEADERS=1

  # MongoDB 預設只在 docker network 內可達(accounting / librechat 內部走 mongodb:27017)
  # 若你要用 Compass 從 host 連 · 暫時手動加(看 PRE-DELIVERY-CHECKLIST Day -7 邊界檢查):
  #
  # mongodb:
  #   ports:
  #     - "27017:27017"
  #
  # ⚠️ production 上 Cloudflare Tunnel 後 · 一定要把這段註解掉
