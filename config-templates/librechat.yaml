# ========================================
# 承富 AI 系統 · LibreChat 核心設定
# 掛載到容器內 /app/librechat.yaml
# ========================================
#
# 變更紀錄:
#   2026-04-18 · 依 DESIGN-REVIEW T-1 從 Preset 遷移到 Agent 為主
#   2026-04-18 · 依 DESIGN-REVIEW T-4 移除自發明的 key(ragConfig / search / adminSettings)
#                這些功能實際由 .env 控制(SEARCH / MEILI_HOST / ADMIN_EMAIL)
#   2026-04-24 · OpenAI 改為主力,Claude 保留為前端可切換備援
#
# 參考文件:
#   官方 schema: https://www.librechat.ai/docs/configuration/librechat_yaml
#   官方範本:   https://www.librechat.ai/librechat.example.yaml

version: 1.2.1
cache: true

# ==================== 介面客製化 ====================
interface:
  customWelcome: "讓 AI 成為承富的第 11 位同事"
  # 預設指 GitHub 上 docs · 確保是有效 URL · 不會炸 LibreChat URL 解析
  # 設好 Cloudflare Tunnel 後改成 https://ai.<承富domain>.com/privacy
  privacyPolicy:
    externalUrl: "https://github.com/Sterio068/chengfu-ai/blob/main/docs/05-SECURITY.md"
    openNewTab: true
  termsOfService:
    externalUrl: "https://github.com/Sterio068/chengfu-ai/blob/main/README.md"
    openNewTab: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false      # Preset 功能 v0.8+ 已退為次要,承富統一用 Agent
  prompts: true       # 個人 prompt 模板(每位同仁可存自己的)
  bookmarks: true
  multiConvo: true
  agents: true        # 啟用 Agent(承富 10 個專家的主要載體)
  artifacts: true     # 開啟互動 Artifacts(HTML/SVG/React 即時可視化)
  webSearch: true     # 開啟 web search 工具

# ==================== 註冊設定 ====================
# 承富為封閉型 10 人環境,註冊完全關閉(ALLOW_REGISTRATION=false in .env)
# 新同仁由管理員後台建立帳號
registration:
  socialLogins: []

# ==================== 檔案上傳限制 ====================
fileConfig:
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 50        # 單檔 50 MB
      totalSizeLimit: 200      # 單對話總量 200 MB
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
  serverFileSizeLimit: 50

# ==================== Endpoint 設定 ====================
#
# OpenAI / Anthropic:
#   原生 endpoint,透過 .env 的 OPENAI_API_KEY / ANTHROPIC_API_KEY 自動啟用
#   模型白名單透過 .env 的 OPENAI_MODELS / ANTHROPIC_MODELS 控制
#   前端 Launcher 會依使用者選擇,打到對應 provider 的 Agent 版本
#
# Agent:
#   承富 10 個職能助手的載體(主管家 + 9 專家 · v4.0 決議精簡)· 見下方 endpoints.agents 設定
#
endpoints:
  agents:
    # 允許所有使用者進 Agent Builder(但建 Agent 需 admin 審核,透過 UI 權限控制)
    disableBuilder: false

    # 承富 Agent 深度運用多供應商工具能力
    # 注意:vision / thinking 等能力仍由各 provider/model 自身支援決定
    capabilities:
      - "execute_code"      # Code Interpreter(產 Word/PPT/Excel/圖表)
      - "file_search"       # 原生 RAG(Company Memory + Skills + Claude Skills + 承富知識庫)
      - "actions"           # 呼叫外部 API(Fal.ai 生圖、PCC 採購網、會計 API)
      - "tools"             # 內建工具
      - "web_search"        # 即時網路搜尋(競品、時事、法規)
      - "artifacts"         # HTML/SVG/React 即時可視化(設計預覽、流程圖、儀表板)
      - "ocr"               # 影像 / PDF 內文字識別(vision 相關)
      - "context"           # 對話 context 管理
      - "chain"             # 多步驟 reasoning 鏈

    recursionLimit: 50      # 提高遞迴上限(複雜任務可能多次呼叫工具)

# ==================== Agent modelSpecs(設計上的 5 Workspace 入口)====================
#
# 🟡 v1.0 真實狀況(ROADMAP §11.7):
#   modelSpecs 「不啟用」· 5 Workspace 入口**只在承富 Launcher** 呈現
#   (frontend/launcher/index.html 5 個彩色卡 · ⌘1-5 切換)
#
#   LibreChat 原生 UI 使用者看到的還是 endpoint 預設選單(agents)· 不分 Workspace
#   因為:
#     1. modelSpecs 需先跑 create-agents.py 拿到實際 agent_id 後填入這檔
#     2. 但承富同仁 99% 從 Launcher 進系統(nginx Route A 302) · LibreChat UI 屬「進階」
#     3. 強制 modelSpecs 反而會限制 Champion / Sterio debug 時的彈性
#
# 若 v1.2 要在 LibreChat UI 也呈現 5 Workspace · 步驟:
#   1. python3 scripts/create-agents.py --tier core --provider both(取得 OpenAI / Claude agent_id)
#   2. 從 mongo 撈出對應 _id:
#      docker exec chengfu-mongo mongosh chengfu --quiet --eval \
#        'JSON.stringify(db.agents.find({},{_id:1,name:1}).toArray())'
#   3. 取消下方註解 + 把 agent_id 填入 preset.agent_id
#   4. docker compose restart librechat
#   5. 跑 LIBRECHAT-UPGRADE-CHECKLIST §5a 驗 _id 穩定性
#
# 範本(僅當你真要啟用時參考):
# modelSpecs:
#   enforce: false
#   prioritize: true
#   list:
#     - name: "orchestrator"
#       label: "✨ 主管家"
#       preset:
#         endpoint: "agents"
#         agent_id: "agent_xxxxx"  # 從 create-agents.py 輸出取得
#     # ... 其他 9 個

# ==================== Actions(外部 API · v1.51 啟用)====================
# Agents 透過 OpenAPI spec 呼叫的外部工具。
# allowedDomains 是 LibreChat 安全白名單 · 沒列上去就會被 isActionDomainAllowed 擋
# 對應 config-templates/actions/*.json 的 servers[].url 域名
#
# 實際掛載到哪個 Agent 由 scripts/wire-actions.py 透過 LibreChat API
# POST /api/agents/actions/:agent_id 完成 · librechat.yaml 只開白名單
actions:
  allowedDomains:
    - "api.openai.com"                # OpenAI gpt-image-1 / ChatGPT Images 2.0(設計)· 用既有 OPENAI_API_KEY
    - "fal.run"                       # Fal.ai 生圖 · 備案 · 需 .env FAL_KEY(目前不掛)
    - "pcc.g0v.ronny.tw"              # 政府電子採購網 g0v API(投標)· 無需 key
    - "http://accounting:8000"        # 內建會計 API(財務)· container 內網
                                       # 必帶 http:// scheme · LibreChat 預設強制 https
                                       # 內部 HTTP 服務必須顯式覆蓋

# ==================== 速率限制(per user / per IP)====================
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ==================== 其他原生能力 ====================
#
# Meilisearch 對話搜尋:由 .env 的 SEARCH / MEILI_HOST / MEILI_MASTER_KEY 控制
# Admin 用量監控:  由 .env 的 ADMIN_EMAIL 與 LibreChat 後台 UI 控制
# 寄信(密碼重設):由 .env 的 EMAIL_* 控制
#
# 這些項目不需要在 librechat.yaml 宣告(T-4 指出原檔的 search / ragConfig /
# adminSettings 都是自發明的 key,實際不會被讀取)
