# 企業 AI 工作台 · Docker Compose 設定
#
# 用法:
#   docker compose pull
#   docker compose up -d
#
# 停止:
#   docker compose down
#
# 重新構建:
#   docker compose up -d --force-recreate
#
# 變更紀錄:
#   2026-04-18 · 依 DESIGN-REVIEW T-2 移除 rag-api / vectordb / whisper 三個容器
#   2026-04-18 · 依 DESIGN-REVIEW T-5 image 改 pin 具體版本(避免 latest 破壞性更新)
#   2026-04-18 · 依 Docker Compose v2 移除 obsolete `version` 欄位
#   2026-04-28 · 依 LibreChat v0.8.5 實測補 RAG_API_URL
#                指向 accounting 內建 /rag adapter,避免額外 registry / pgvector 交付風險
#
# 重要提醒:
#   API key 與密碼應由啟動腳本注入:
#   - macOS: scripts/start.sh 從 Keychain 注入
#   - Windows: scripts/start-windows.ps1 從 DPAPI 加密檔注入
#   .env 僅存非機密設定(見 .env.example 與 docs/05-SECURITY.md)。

services:
  # ==================== nginx 反向代理 + 企業 AI Launcher ====================
  # 職責:
  # - 根路徑 /           → 企業 AI Launcher(客製首頁,macOS 風)
  # - /chat, /api/*, 其他 → LibreChat
  # - 注入客製 CSS/JS 到 LibreChat 回應(sub_filter)
  nginx:
    # Codex R4.5 · pin @sha256 避免上游 tag 被污染
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: company-ai-nginx
    restart: unless-stopped
    depends_on:
      - librechat
    ports:
      - "80:80"       # 對外唯一入口
    volumes:
      - ../frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/nginx/proxy-common.conf:/etc/nginx/proxy-common.conf:ro
      - ../frontend/launcher:/var/www/launcher:ro
      - ../frontend/custom:/var/www/custom:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - company-ai-network
    mem_limit: 256m
    # R14#16 · nginx log rotation(mounted /var/log/nginx · docker log driver 只管 stdout/stderr)
    # 真正的 access.log/error.log 在 volume 裡 · logrotate 另由 host 排(見 docs/04-OPERATIONS.md)
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ==================== LibreChat 主服務 ====================
  # 原生能力覆蓋:
  # - file_search(透過 accounting /rag adapter 提供 LibreChat RAG API 相容介面)
  # - code_interpreter(毛利試算、Excel 輸出)
  # - web_search(內建)
  # - speech_to_text(內建,不需 whisper 容器)
  librechat:
    # Codex R4.5 · pin @sha256 · 2026-04-21 驗證 digest
    image: ghcr.io/danny-avila/librechat:v0.8.5@sha256:a46254938507971e0d4f7ed3f9d116bd9b118f4810b5b75eb716baf575645068
    container_name: company-ai-librechat
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      accounting:
        condition: service_healthy
    # 不再對外 expose 3080,改由 nginx 代理
    expose:
      - "3080"
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/company_ai
      - MEILI_HOST=http://meilisearch:7700
      - RAG_API_URL=http://accounting:8000/rag
      # Codex R3.1 · start.sh 從 Keychain 注入的 env · 明示傳入 · 否則 env_file 裡 placeholder 會覆蓋
      # env_file 讀檔時 · docker compose 不會把 host env 覆蓋 file 值 · 必須這裡 explicit
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CREDS_KEY=${CREDS_KEY}
      - CREDS_IV=${CREDS_IV}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-ci-placeholder-insecure-do-not-use}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./images:/app/client/public/images
      - ./logs:/app/api/logs
      - ./uploads:/app/uploads
    networks:
      - company-ai-network
    # 限制記憶體避免吃爆 16/24GB Mac mini
    mem_limit: 6g
    mem_reservation: 2g

  # ==================== MongoDB 資料庫 ====================
  # 儲存對話紀錄、使用者、Agent 定義、檔案中繼資料
  mongodb:
    image: mongo:7.0@sha256:43fddee7e532a920f3dfdee9e8f4834398c155c26bcb92d790cc1cd3c630fc40
    container_name: company-ai-mongo
    restart: unless-stopped
    command: mongod --quiet --logpath /dev/null
    volumes:
      - ./data/mongo:/data/db
    networks:
      - company-ai-network
    mem_limit: 2g
    # Codex R3.6 · 加 healthcheck · depends_on.condition 用 service_healthy 才真等
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==================== Meilisearch 全文檢索 ====================
  # 對話歷史搜尋(不是 RAG,是 UI 層的歷史對話搜尋)
  meilisearch:
    image: getmeili/meilisearch:v1.12.0@sha256:27f831c41cb735a9c2314b61a33a14552367af6b3e4bcf840f21fd0e64e37a8a
    container_name: company-ai-meili
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      # 預設值 only for CI / lint · 正式部署 start.sh 會從 Keychain 注入真 key
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-ci-placeholder-insecure-do-not-use}
    volumes:
      - ./data/meili:/meili_data
    networks:
      - company-ai-network
    mem_limit: 1g
    # Codex R3.6 · Meili 有 /health · 用 curl(busybox wget --spider 不穩)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health | grep -q available"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== 會計 API(公司內建)====================
  # 台灣格式會計模組 + 專案 / 回饋 / Admin / L3 classifier / Orchestrator / 採購網監測
  accounting:
    build: ../backend/accounting
    container_name: company-ai-accounting
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/company_ai
      - LIBRECHAT_INTERNAL_URL=http://librechat:3080
      - TZ=Asia/Taipei
      # V1.1 §E 多來源知識庫 · 需 Meili 與允許的 source root
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-ci-placeholder-insecure-do-not-use}
      # Codex R2.2 · 預設收緊至 /Volumes(NAS)+ /data(容器 bind mount)
      # /Users / /mnt 要開請 env 明示 · 防離職員工桌面被索引
      - KNOWLEDGE_ALLOWED_ROOTS=${KNOWLEDGE_ALLOWED_ROOTS:-/Volumes,/data}
      - FAL_API_KEY=${FAL_API_KEY:-}
      # ============ Codex R7/R8 · auth 三 env(prod 強制) ============
      # ECC_ENV=production → _is_prod()=True → 啟動時驗 JWT_REFRESH_SECRET / ECC_INTERNAL_TOKEN
      # 沒設 → R8#6 raise · 防誤配 dev mode
      - ECC_ENV=${ECC_ENV:-production}
      - NODE_ENV=${NODE_ENV:-production}
      # LibreChat RAG API short-lived bearer token 用 JWT_SECRET 簽,accounting /rag adapter 必須同步驗。
      - JWT_SECRET=${JWT_SECRET:-}
      # JWT_REFRESH_SECRET 從 LibreChat .env 同步 · _verify_librechat_cookie 驗 refreshToken 用
      # 沒設 + prod → 啟動 raise(R7#1)· dev mode 容許 silent fallback
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-}
      # ECC_INTERNAL_TOKEN · cron daily-digest / tender-monitor 用 · prod 強制
      # 用 `openssl rand -hex 32` 產生 · 同步進 launchd plist 環境
      - ECC_INTERNAL_TOKEN=${ECC_INTERNAL_TOKEN:-}
      # ACTION_BRIDGE_TOKEN · LibreChat Actions 專用低權限 token · 搭配 X-Acting-User + endpoint allowlist
      - ACTION_BRIDGE_TOKEN=${ACTION_BRIDGE_TOKEN:-}
      # X-User-Email legacy fallback · prod 預設關 · dev 預設開
      # 設 1 → 即使 prod 也允許(過渡期 launcher 還沒切 cookie 時用)
      - ALLOW_LEGACY_AUTH_HEADERS=${ALLOW_LEGACY_AUTH_HEADERS:-0}
      # v1.3 batch6 · CRITICAL C-2 · OAuth token 加密 key(>= 32 bytes)
      # prod 必設 · dev 容退化 PLAIN: 明文 + warning
      - CREDS_KEY=${CREDS_KEY:-}
      # v1.3 batch6 · CRITICAL C-3 · admin email allowlist(移除 hardcode 後必設)
      # 沒設 prod 起得來但 admin endpoint 全鎖死 + warn log
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      # v1.3 A3 · CRITICAL C-3 · L3 機敏內容 server-side 強制擋
      # 預設 audit-only(寫 log 不擋)· 設 1 啟用硬擋(回 403)
      - L3_HARD_STOP=${L3_HARD_STOP:-0}
      # v1.3 A3 · CRITICAL C-8 · OAuth callback URL base(白名單)
      # prod 必設 · 否則退化用 X-Forwarded-Host(可被偽造做 open-redirect)
      - OAUTH_REDIRECT_BASE_URL=${OAUTH_REDIRECT_BASE_URL:-}
      # v1.54 · 主管家 orchestrator 自動執行(daily quota + admin kill switch + audit)
      - ORCHESTRATOR_EXECUTION_ENABLED=${ORCHESTRATOR_EXECUTION_ENABLED:-0}
      - ORCHESTRATOR_DAILY_PER_USER=${ORCHESTRATOR_DAILY_PER_USER:-5}
      # v1.66 Q3 · Sentry · 異常自動上報 · DSN 沒設則 no-op · 不影響本地 dev
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE=${SENTRY_TRACES_SAMPLE:-0.1}
      - SENTRY_PROFILES_SAMPLE=${SENTRY_PROFILES_SAMPLE:-0.0}
      - APP_VERSION=${APP_VERSION:-v1.66}
      # AI 引擎 key · health endpoint 判存在 + vision/orchestrator 用 · 同 LibreChat
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # NotebookLM Enterprise · 選配並行知識庫(資料包同步)
      - NOTEBOOKLM_ENTERPRISE_ENABLED=${NOTEBOOKLM_ENTERPRISE_ENABLED:-false}
      - NOTEBOOKLM_PROJECT_NUMBER=${NOTEBOOKLM_PROJECT_NUMBER:-}
      - NOTEBOOKLM_LOCATION=${NOTEBOOKLM_LOCATION:-global}
      - NOTEBOOKLM_ENDPOINT_LOCATION=${NOTEBOOKLM_ENDPOINT_LOCATION:-global}
      - NOTEBOOKLM_ACCESS_TOKEN=${NOTEBOOKLM_ACCESS_TOKEN:-}
      - SOURCE_PACK_COMPANY_DIR=/data/source-docs/company
      - SOURCE_PACK_TRAINING_DIR=/data/source-docs/user-guide
      # 同仁連線網址(LAN IP / cloudflared)· admin view 顯示用
      - HOST_NETWORK_FILE=/data/host-network.json
    volumes:
      # start.sh 啟動時把偵測結果寫入 .host-network.json · 唯讀掛入容器
      - ./.host-network.json:/data/host-network.json:ro
      - ../knowledge-base/company:/data/source-docs/company:ro
      - ../frontend/launcher/user-guide:/data/source-docs/user-guide:ro
    expose:
      - "8000"
    networks:
      - company-ai-network
    # R14#12 · 強制 resource limit · 1 個爛 query 不會 OOM kill nginx/mongo/librechat
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 2.0
    # R14#16 · log rotation(accounting 吐 JSON log · 限 max-size 避免 disk full)
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== Uptime 監控 ====================
  # 企業 AI健康儀表 · 失敗推 Slack/Email
  # 首次進 http://localhost:3001 建管理帳號 + 加監控目標(見 docs/04-OPERATIONS.md)
  uptime-kuma:
    # Audit fix · dep #2 · digest pin(2026-04-22 驗證)
    image: louislam/uptime-kuma:1@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: company-ai-uptime
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data/uptime:/app/data
    networks:
      - company-ai-network
    mem_limit: 256m

networks:
  company-ai-network:
    driver: bridge

# 預期資源佔用(24GB Mac mini,10 人尖峰):
#   librechat:     ~3-4 GB
#   mongodb:       ~500 MB - 1 GB
#   meilisearch:   ~300-500 MB
#   Docker Desktop overhead: ~2 GB
#   macOS + Apps:  ~6-8 GB
#   尖峰預留:      ~10 GB
#   合計:         約 22 GB,24GB 有餘裕
