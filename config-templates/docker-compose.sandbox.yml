# 承富 AI · LibreChat 升版測試 sandbox
# =====================================
# 用途:在不影響 production 的情況下 · 測試新版 LibreChat 是否相容
# 設計原則(Round 8 reviewer · LIBRECHAT-UPGRADE-CHECKLIST §3):
#   - 完全隔離 · 不共用 production DB / volumes / port
#   - 不同 project name · `chengfu-sandbox`(避免 docker compose 認為同套)
#   - Meili 共用 master key 但 index 是獨立 collection
#   - accounting 容器跑 · 但連 sandbox mongo · 不污染正式資料
#
# 用法:
#   1. 設想升版的 image tag(例如 v0.8.5-rc1)
#      export SANDBOX_LIBRECHAT_VERSION=v0.8.5-rc1
#
#   2. 啟動 sandbox(不影響 production · 用不同 project name)
#      docker compose -f config-templates/docker-compose.sandbox.yml \
#                     -p chengfu-sandbox \
#                     up -d
#
#   3. 訪問
#      http://localhost:8080         · sandbox launcher
#      http://localhost:8081/admin   · sandbox accounting API docs
#
#   4. 跑契約測試(必驗 · LIBRECHAT-UPGRADE-CHECKLIST §6)
#      SMOKE_BASE_URL=http://localhost:8080 ./scripts/smoke-librechat.sh
#
#   5. 跑 admin/librechat-contract 確認 transactions schema 沒變
#      curl -H "X-User-Email: sterio068@gmail.com" \
#           http://localhost:8081/admin/librechat-contract
#
#   6. 全綠才升 production · 紅旗回滾:
#      docker compose -f config-templates/docker-compose.sandbox.yml \
#                     -p chengfu-sandbox \
#                     down -v   # 連 volume 一起砍
#
# 注意事項:
#   - 此 compose 預設端口 80→8080 · 27017→27018 · 8000→8081
#   - sandbox volume 在 ./data-sandbox/ · 不要與 ./data/ 混用
#   - Cloudflare Tunnel 不接 · 只能 localhost 測

services:
  # ==================== sandbox nginx · 對外 8080 ====================
  nginx-sandbox:
    image: nginx:1.27-alpine
    container_name: chengfu-nginx-sandbox
    restart: "no"  # 測完就收 · 不要 unless-stopped
    depends_on:
      - librechat-sandbox
    ports:
      - "8080:80"  # 對外 8080(避開 production 的 80)
    volumes:
      - ../frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/nginx/chengfu-proxy.conf:/etc/nginx/chengfu-proxy.conf:ro
      - ../frontend/launcher:/var/www/launcher:ro
      - ../frontend/custom:/var/www/custom:ro
    networks:
      - chengfu-sandbox-network
    mem_limit: 256m

  # ==================== LibreChat sandbox(用待升版本)====================
  librechat-sandbox:
    image: ghcr.io/danny-avila/librechat:${SANDBOX_LIBRECHAT_VERSION:-v0.8.5-rc1}
    container_name: chengfu-librechat-sandbox
    restart: "no"
    depends_on:
      - mongodb-sandbox
      - meilisearch-sandbox
    expose:
      - "3080"
    env_file: .env
    environment:
      - HOST=0.0.0.0
      # ⚠ 用 sandbox DB · 不汙染 production
      - MONGO_URI=mongodb://mongodb-sandbox:27017/chengfu_sandbox
      - MEILI_HOST=http://meilisearch-sandbox:7700
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./data-sandbox/uploads:/app/uploads
    networks:
      chengfu-sandbox-network:
        # Codex Round 10.5 fix · nginx conf 寫死 upstream `librechat:3080`
        # 加 alias · 共用 production 的 default.conf 不用改
        aliases:
          - librechat
    mem_limit: 4g  # sandbox 比 production 小一點 · 避免占滿 Mac mini

  # ==================== Mongo sandbox · 對外 27018 ====================
  mongodb-sandbox:
    image: mongo:7.0
    container_name: chengfu-mongo-sandbox
    restart: "no"
    command: mongod --quiet --logpath /dev/null
    volumes:
      - ./data-sandbox/mongo:/data/db
    ports:
      - "27018:27017"  # localhost 連 27018 進 sandbox mongo · 給 dump/restore 工具用
    networks:
      - chengfu-sandbox-network
    mem_limit: 1g

  # ==================== Meili sandbox ====================
  meilisearch-sandbox:
    image: getmeili/meilisearch:v1.12.0
    container_name: chengfu-meili-sandbox
    restart: "no"
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-ci-placeholder-insecure-do-not-use}
    volumes:
      - ./data-sandbox/meili:/meili_data
    networks:
      - chengfu-sandbox-network
    mem_limit: 512m

  # ==================== accounting sandbox · 對外 8081 ====================
  # 用同一份 main.py · 但連 sandbox mongo · 確認 endpoint 對升版後 LibreChat 還能讀
  accounting-sandbox:
    build: ../backend/accounting
    container_name: chengfu-accounting-sandbox
    restart: "no"
    depends_on:
      - mongodb-sandbox
      - meilisearch-sandbox
    environment:
      - MONGO_URI=mongodb://mongodb-sandbox:27017/chengfu_sandbox
      - LIBRECHAT_INTERNAL_URL=http://librechat:3080  # network alias
      - TZ=Asia/Taipei
      - MEILI_HOST=http://meilisearch-sandbox:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-ci-placeholder-insecure-do-not-use}
      - KNOWLEDGE_ALLOWED_ROOTS=${KNOWLEDGE_ALLOWED_ROOTS:-/Volumes,/Users,/mnt,/data}
      - FAL_API_KEY=  # sandbox 不接 Fal · 避免測試亂花錢
    ports:
      - "8081:8000"  # 對外 8081 · 直接 curl /admin/* 不用 nginx
    networks:
      chengfu-sandbox-network:
        # 讓 nginx conf 的 `accounting:8000` 能解析
        aliases:
          - accounting
    mem_limit: 512m

networks:
  chengfu-sandbox-network:
    driver: bridge
    # 不與 production network 共用 · 避免 sandbox accounting 誤連到正式 mongo

# 升版完不再用後 · 一定要 cleanup:
#   docker compose -f config-templates/docker-compose.sandbox.yml -p chengfu-sandbox down -v
#   rm -rf config-templates/data-sandbox/
