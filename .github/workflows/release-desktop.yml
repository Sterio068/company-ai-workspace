name: Desktop Release · Private Update Proxy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.3.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-14
    env:
      VOTER_SERVICE_UPDATE_PROXY_URL: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_URL }}
      VOTER_SERVICE_UPDATE_PROXY_TOKEN: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/launcher/package-lock.json
            desktop/package-lock.json
      - name: Build launcher
        run: |
          npm ci --prefix frontend/launcher
          npm run build --prefix frontend/launcher
      - name: Build desktop macOS
        run: |
          npm ci --prefix desktop
          npm run typecheck --prefix desktop
          npm run dist:mac --prefix desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

  build-win:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      VOTER_SERVICE_UPDATE_PROXY_URL: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_URL }}
      VOTER_SERVICE_UPDATE_PROXY_TOKEN: ${{ secrets.VOTER_SERVICE_UPDATE_PROXY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/launcher/package-lock.json
            desktop/package-lock.json
      - name: Build launcher
        shell: pwsh
        run: |
          npm ci --prefix frontend/launcher
          npm run build --prefix frontend/launcher
      - name: Build desktop Windows
        shell: pwsh
        run: |
          npm ci --prefix desktop
          npm run typecheck --prefix desktop
          npm run dist:win --prefix desktop
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml

  publish-release:
    name: Publish private GitHub Release assets
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Desktop release for private update proxy."
          fi
          find release-assets -maxdepth 3 -type f -print0 | xargs -0 gh release upload "$TAG" --clobber
