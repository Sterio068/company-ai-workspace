name: CI · 承富 AI 系統

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: FastAPI 會計模組測試
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          cd backend/accounting
          pip install -r requirements.txt
      - name: Run unit tests(mongomock · 不含 integration/)
        run: |
          cd backend/accounting
          pytest tests/ test_main.py -v --tb=short --ignore=tests/integration

  # v1.3 A3 · launcher esbuild bundle 可 build
  test-frontend-build:
    name: Launcher esbuild bundle build verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/launcher/package.json
      - name: Install esbuild
        run: |
          cd frontend/launcher
          npm install
      - name: Build bundle
        run: |
          cd frontend/launcher
          npm run build
          ls -la dist/
      - name: Verify manifest
        run: |
          cd frontend/launcher
          test -f dist/manifest.json
          python3 -c "import json; m=json.load(open('dist/manifest.json')); assert 'app.js' in m and 'onboarding.js' in m, m"

  test-integration:
    name: 真 Mongo 整合測試(v1.3 C1)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports: ["27017:27017"]
        options: --health-cmd="mongosh --quiet --eval 'db.runCommand({ping:1})'" --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          cd backend/accounting
          pip install -r requirements.txt
      - name: Run integration tests against real Mongo
        env:
          INTEGRATION_MONGO_URL: mongodb://localhost:27017
        run: |
          cd backend/accounting
          pytest tests/integration -v --tb=short

  lint-agent-json:
    name: 10 Agent JSON 格式驗證
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          for f in config-templates/presets/[0-9]*.json; do
            echo "Validating $f..."
            python3 -c "import json; data=json.load(open('$f')); assert data['presetId'], '$f 缺 presetId'; assert data['promptPrefix'], '$f 缺 promptPrefix'; print('  OK')"
          done

  lint-actions:
    name: Actions OpenAPI schema 驗證
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install openapi-spec-validator
        run: pip install openapi-spec-validator
      - name: Validate each action
        run: |
          for f in config-templates/actions/*.json; do
            echo "Validating $f..."
            openapi-spec-validator "$f"
          done

  dry-run-create-agents:
    name: create-agents.py 乾跑
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dry run
        run: |
          python3 scripts/create-agents.py --dry-run --tier core
          python3 scripts/create-agents.py --dry-run --tier all

  docker-build:
    name: Docker images 能 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build accounting image
        run: docker build -t chengfu-accounting backend/accounting/
      - name: Prepare CI .env(複製 example · 真實 key 由 Keychain 注入)
        run: |
          # CI 只驗 compose syntax · 不真跑 · 用 .env.example 當 placeholder
          cp config-templates/.env.example config-templates/.env
      - name: Verify compose syntax
        env:
          # 給 docker compose 補預設 · 避免 "variable not set" warning 升 fatal
          MEILI_MASTER_KEY: ci-placeholder-key
          # Codex R2.2 · 明示 · 不走 default
          KNOWLEDGE_ALLOWED_ROOTS: /tmp
          FAL_API_KEY: ""
        run: docker compose -f config-templates/docker-compose.yml config > /dev/null
      - name: Verify sandbox compose syntax
        env:
          MEILI_MASTER_KEY: ci-placeholder-key
          SANDBOX_LIBRECHAT_VERSION: v0.8.5-rc1
        run: |
          if [ -f config-templates/docker-compose.sandbox.yml ]; then
            docker compose -f config-templates/docker-compose.sandbox.yml config > /dev/null
          else
            echo "⚠ sandbox compose not present yet · skip"
          fi

  e2e-test:
    name: Playwright E2E(Codex R5#6 · PR 真起 sandbox 跑)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Playwright
        run: |
          cd tests/e2e
          npm install
          npx playwright install --with-deps chromium
      - name: Spin up minimal stack(只 nginx + mongo + accounting · 不裝 LibreChat)
        env:
          MEILI_MASTER_KEY: ci-placeholder-key
          KNOWLEDGE_ALLOWED_ROOTS: /tmp
          FAL_API_KEY: ""
        run: |
          cp config-templates/.env.example config-templates/.env
          # 只起 mongo + meili + accounting(LibreChat 太重 · CI 不適合)
          docker compose -f config-templates/docker-compose.yml up -d mongodb meilisearch accounting
          # 等 healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/healthz 2>/dev/null; then break; fi
            sleep 2
          done
      - name: Lint tests(parse spec OK)
        run: |
          cd tests/e2e
          npx playwright test --list
      - name: Run minimal API tests(若有 spec 標 @api)
        continue-on-error: true  # E2E 對 LibreChat UI 不可能在 CI 真跑 · 只跑 API spec
        run: |
          cd tests/e2e
          # 跑 critical-journeys.spec.ts 的「API 健康檢查」section
          npx playwright test --grep "API 健康檢查" || echo "⚠ E2E API 部分失敗 · nightly 須查"
