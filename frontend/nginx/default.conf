# ============================================================
# 企業 AI · nginx 反向代理
# ============================================================
# 職責:
#   / 與 /static/*  → 企業 AI launcher(靜態檔)
#   /chat 與其他    → 代理到 LibreChat(port 3080)
#   將客製 CSS / JS 注入 LibreChat 回應
# ============================================================

# 日誌
log_format company_ai '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';

# R14#13 · 全域 rate limit · 防 1000 req/s 拖垮 Mongo
# 10m 記憶 ~ 160k 連線(per-IP)· 50r/s burst 100 · 公司 10 人公司用足夠
# 超過 → 503(nginx 預設)· 前端處理 retry
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=acc_limit:10m rate=20r/s;

server {
    listen 80;
    server_name localhost company-ai.local _;
    server_tokens off;

    # R19 · rotate 走 docker logging driver(json-file max-size=20m max-file=5)
    # 原本寫 /var/log/nginx/ · newsyslog rotate 後 nginx 仍寫舊 FD · 沒意義
    # 改寫 stdout/stderr → docker 自動 rotate · 一致性 + 不需 host newsyslog
    access_log /dev/stdout company_ai;
    error_log  /dev/stderr warn;

    client_max_body_size 60M;  # 與 LibreChat fileConfig 匹配(50MB + buffer)

    # Codex R4.3 · 安全 headers · 擋 clickjacking + XSS + 降低 CSP
    # 內網 10 人系統 · 不用太嚴 · 但最基本擋 iframe 嵌入 + inline script 盜用
    # 注意:LibreChat UI 本身需要 inline script + eval · CSP 不能太嚴
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 預設拒絕 sensors；Launcher 文件另行 opt-in 給場勘 PWA 使用
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ==========================================================
    # 1. 企業 AI Launcher 首頁
    # ==========================================================
    # 根路徑只回傳 launcher,不代理到 LibreChat
    location = / {
        root /var/www/launcher;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # Codex R4.3 · security headers · 必須在每 location 重加(nginx add_header 繼承規則)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;
        # 技術債#18(2026-04-23)· launcher 自己嚴 CSP(LibreChat 路徑另外)
        # script-src 'self' · 不接遠端 CDN(防供應鏈)· 不允許 inline script
        # object-src 'none' · 擋 Flash/Java applet · base-uri 'self' 防 base 標記注入
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # ==========================================================
    # 1.5 攔截 LibreChat 的 Workbox Service Worker(路線 A 必要)
    # 使用者瀏覽器若註冊過 LibreChat SW,回傳「自我銷毀」腳本
    # ==========================================================
    location = /sw.js {
        root /var/www/launcher;
        try_files /kill-sw.js =404;
        add_header Content-Type application/javascript;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~ ^/workbox-.*\.js$ {
        root /var/www/launcher;
        try_files /kill-sw.js =404;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 企業 AI 的 SW · 限定 scope 在 / · 不碰 LibreChat 路徑
    # 關鍵:SW 必須 no-cache · 否則 SW 更新失效(瀏覽器拿不到新版 sw.js)
    location = /static/sw.js {
        root /var/www;
        try_files /launcher/sw.js =404;
        add_header Content-Type application/javascript;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # v1.9 perf · esbuild bundle dist/ 用 immutable cache
    # 檔名含 content hash · 內容變了檔名也變 · 安全長期 cache
    # nginx try_files 順序確保先試 dist 再 fallback 到原始 module(dev 模式)
    location ^~ /static/dist/ {
        alias /var/www/launcher/dist/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # MIME 確保 .js 帶 module type
        add_header Content-Type "application/javascript" always;
    }

    # Launcher 的靜態檔(CSS / 原始 JS modules dev 用)· no-cache 防 module 改檔但瀏覽器拿舊
    location /static/ {
        alias /var/www/launcher/;
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # 新版 UI/UX 演示版 · 不影響正式 Launcher
    location = /ui-demo {
        root /var/www/launcher;
        try_files /ui-vnext-demo.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # 企業 AI 客製 CSS / JS(注入到 LibreChat 頁面)
    location /company-ai-custom/ {
        alias /var/www/custom/;
        try_files $uri =404;
        expires 1h;
    }

    # ==========================================================
    # 1.8 路線 A · 強制重導 LibreChat SPA 路徑到企業 AI Launcher
    # 302 於瀏覽器 request LibreChat UI 時生效 · 使用者無法看到 LibreChat 介面
    # ==========================================================
    location = /c/new { return 302 /; }
    location ~ ^/c/(.+)$ { return 302 /?convo=$1; }

    # 企業 AI 客製 CSS / JS · 加強 cache-buster
    location ~ ^/company-ai-custom/(.+)$ {
        alias /var/www/custom/$1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==========================================================
    # 2. 導向規則
    # ==========================================================
    # /login /register 導回 LibreChat · 注入企業 AI 客製 JS(路線 A · 登入後彈回 /)
    location = /login {
        proxy_pass http://librechat:3080/login;
        include /etc/nginx/proxy-common.conf;
        sub_filter '</head>' '<link rel="stylesheet" href="/company-ai-custom/librechat-custom.css"><script src="/company-ai-custom/librechat-relabel.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
    location = /register {
        proxy_pass http://librechat:3080/register;
        include /etc/nginx/proxy-common.conf;
        sub_filter '</head>' '<link rel="stylesheet" href="/company-ai-custom/librechat-custom.css"><script src="/company-ai-custom/librechat-relabel.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
    location = /forgot-password {
        proxy_pass http://librechat:3080/forgot-password;
        include /etc/nginx/proxy-common.conf;
    }

    # LibreChat 相對路徑的對話頁:/chat -> /c/new, /chat/c/xxx -> /c/xxx
    location /chat {
        rewrite ^/chat$ /c/new permanent;
        rewrite ^/chat/(.*)$ /$1 break;
        proxy_pass http://librechat:3080;
        include /etc/nginx/proxy-common.conf;

        # 注入企業 AI 客製 CSS + JS 到 HTML 回應
        sub_filter '</head>' '<link rel="stylesheet" href="/company-ai-custom/librechat-custom.css"><script src="/company-ai-custom/librechat-relabel.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # ==========================================================
    # 3. LibreChat API · Codex R7#9 預算 gate
    # ==========================================================
    # /api/agents/chat 必須先過預算 preflight · 超預算 user 直接擋 LibreChat 對話
    # 防同事繞過 launcher /quota/check 直接打 LibreChat API
    location = /_quota_gate {
        internal;
        proxy_pass http://accounting:8000/quota/preflight;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # 帶 cookie 過去讓 accounting 驗 refreshToken
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        # gate 自己不該再加 security headers · 內部呼叫
    }

    # SSE 對話入口 · 過 quota gate
    # v1.69 · LibreChat v0.8.5 endpoint: /api/agents/chat(舊 v0.7 的 /api/ask 已 deprecate)
    location /api/agents/chat {
        auth_request /_quota_gate;
        # R8#3 · 從 /quota/preflight response 抓 X-Quota-* header · 給 error_page 顯示
        auth_request_set $quota_spent_ntd $upstream_http_x_quota_spent_ntd;
        auth_request_set $quota_cap_ntd $upstream_http_x_quota_cap_ntd;
        auth_request_set $quota_request_id $upstream_http_x_quota_request_id;
        # auth_request 失敗(429)時 · 把 4xx/5xx 轉回 user
        error_page 401 = @quota_401;
        error_page 429 = @quota_429;
        proxy_pass http://librechat:3080/api/agents/chat;
        include /etc/nginx/proxy-common.conf;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # legacy /api/ask redirect(LibreChat v0.7 · 留 404 明確好 debug)
    location /api/ask {
        return 410 '{"error":"endpoint_deprecated","detail":"LibreChat v0.8 起改 /api/agents/chat"}';
        default_type application/json;
    }
    location @quota_401 {
        default_type application/json;
        return 401 '{"error":"unauthenticated","detail":"請從 launcher 登入"}';
    }
    location @quota_429 {
        default_type application/json;
        # R8#3 · 把 spent_ntd / cap_ntd / request_id 帶到 user 看到的 JSON
        # 注意:nginx $$ 不合法 · 改用「元」避開 `$` 轉義問題
        return 429 '{"error":"quota_exceeded","detail":"本月預算已達上限 · 已用 $quota_spent_ntd 元 / 上限 $quota_cap_ntd 元","request_id":"$quota_request_id"}';
    }

    # v1.12 · /api/i18n → accounting backend(launcher + librechat-relabel 共用 TERMS dict)
    # 必須在 /api/ catch-all 之前 · nginx prefix-longest match
    location = /api/i18n {
        proxy_pass http://accounting:8000/api/i18n;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-User-Email "";
        proxy_set_header X-User-Role "";
        # i18n 公開 · 短 cache ok
        add_header Cache-Control "public, max-age=300" always;
    }

    # Electron private release update proxy · 必須在 /api/ LibreChat catch-all 前面。
    # App 只帶 proxy token 打此入口;GitHub token 只存在 accounting server env。
    location ^~ /api/updates/ {
        limit_req zone=acc_limit burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://accounting:8000;
        include /etc/nginx/proxy-common.conf;
        proxy_set_header X-User-Email "";
        proxy_set_header X-User-Role "";
        proxy_set_header X-Agent-Num "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 其他 LibreChat API · 不過 gate(輕量 metadata / 模型列表 / agent 設定等)
    location /api/ {
        # R14#13 · per-IP 50r/s burst 100 · LibreChat UI 需要較高 burst(polling conversations)
        limit_req zone=api_limit burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://librechat:3080/api/;
        include /etc/nginx/proxy-common.conf;

        # R7#10 · LibreChat 不該收 X-User-Email(它有自己 cookie 認證 + JWT)
        # 防有人從 launcher 偽造 header 給 LibreChat
        proxy_set_header X-User-Email "";
        proxy_set_header X-User-Role "";

        # SSE 需要長連線
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ==========================================================
    # 3.1 會計 API(公司內建 FastAPI)
    # R7#10 · prod 必須 strip X-User-Email · 防外部偽造
    # R9#9 · 預設 strip X-Agent-Num · 防 spoof(prod 後端 _resolve_agent_num 走 conversation_id)
    # 開發若要繞過 · 編輯 docker-compose.override.yml ALLOW_LEGACY_AUTH_HEADERS=1
    # 但 nginx 仍 strip · 開發改打 accounting:8000 直連測試
    # ==========================================================
    # LibreChat v0.8.5 會從容器內直打 http://accounting:8000/rag。
    # 此相容 adapter 不應從外部 nginx 暴露,避免未登入者直接上傳/查詢 RAG 文件。
    location ^~ /api-accounting/rag/ {
        default_type application/json;
        return 403 '{"error":"internal_only","detail":"RAG adapter is internal to LibreChat"}';
    }

    location /api-accounting/ {
        # R14#13 · per-IP 20r/s burst 40 · 同事正常用不會到 · 擋 curl script attack
        limit_req zone=acc_limit burst=40 nodelay;
        limit_req_status 429;

        rewrite ^/api-accounting/(.*)$ /$1 break;
        proxy_pass http://accounting:8000;
        include /etc/nginx/proxy-common.conf;
        # v1.69 audit · prod 必須 strip 使用者可偽造 identity headers
        proxy_set_header X-User-Email "";
        proxy_set_header X-User-Role "";
        # R9#9 defense-in-depth · 不信前端 X-Agent-Num · 後端用 conversation_id derive
        proxy_set_header X-Agent-Num "";
    }

    # ==========================================================
    # v1.3.0 dry-run fix · launcher 自己的 manifest.json(PWA)優先
    # 必須在「LibreChat 其他資源」regex 之前 · 否則 /manifest.json 走 LibreChat
    # ==========================================================
    location = /manifest.json {
        root /var/www/launcher;
        try_files /manifest.json =404;
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    # ==========================================================
    # 4. LibreChat 其他資源(images / assets / fonts / __CONFIG)
    # ==========================================================
    location ~ ^/(images|assets|fonts|_next|favicon|manifest|robots) {
        proxy_pass http://librechat:3080;
        include /etc/nginx/proxy-common.conf;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ==========================================================
    # 5. 其他所有 → LibreChat(含 / 以外的 root 路徑)
    # 注入客製 CSS/JS 到 HTML
    # ==========================================================
    location / {
        proxy_pass http://librechat:3080;
        include /etc/nginx/proxy-common.conf;

        sub_filter '</head>' '<link rel="stylesheet" href="/company-ai-custom/librechat-custom.css"><script src="/company-ai-custom/librechat-relabel.js"></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # ==========================================================
    # 健康檢查
    # ==========================================================
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
