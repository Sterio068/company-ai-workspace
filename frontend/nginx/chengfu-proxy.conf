# ============================================================
# 共用 proxy 參數(include 用)
# ============================================================
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# 避免 sub_filter 因 gzip 失效
proxy_set_header Accept-Encoding "";

# Codex R7#10 · X-User-Email 處理策略
# 此 include 用於所有 proxy location · 不能無條件 strip(會打死 dev launcher)
# 改:
# - 對 LibreChat /api/* · 不該帶 user header(LibreChat 自己有 cookie 認證)→ 走下面 /api/ 區段 strip
# - 對 /api-accounting/* · launcher 自送 header · 但 accounting 端 prod 走 ALLOW_LEGACY_AUTH_HEADERS=0 拒絕
# - 對外部偽造防禦:Cloudflare Tunnel 只暴露 / + /api/ · /api-accounting/ 只在內網
# 詳見 docs/05-SECURITY.md §「prod auth defense-in-depth」

# Codex R4.3 · security headers · include 到每個 proxy location
# 原本只在 server block 加 · 但 location-level add_header 會覆蓋 · 必須每 location 重加
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
